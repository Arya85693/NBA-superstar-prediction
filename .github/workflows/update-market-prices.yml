name: Update Market Prices

on:
  workflow_dispatch:
  schedule:
    # Twice per hour at :15 and :45 UTC (avoids :00 UTC, where GitHub warns load can delay/drop schedules).
    # Omit `timezone:` so older GitHub versions still accept the workflow; see events docs for timezone-aware cron.
    - cron: "15,45 * * * *"

permissions:
  contents: read

concurrency:
  group: update-market-prices
  cancel-in-progress: false

jobs:
  update-market:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"
      NBA_API_TIMEOUT_SECONDS: "90"
      NBA_API_MAX_ATTEMPTS: "3"
      NBA_API_RETRY_BACKOFF_SECONDS: "5"
      BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pipeline dependencies
        run: pip install -r requirements.txt

      - name: Fetch NBA data and rebuild prices
        run: python pipeline/run_pipeline.py --fetch-balldontlie --active

      - name: Sync prices to Supabase
        run: python pipeline/sync_prices_to_supabase.py
